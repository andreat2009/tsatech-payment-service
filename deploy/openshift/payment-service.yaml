apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
data:
  PAYMENT_DB_URL: jdbc:postgresql://pgtest.platform.svc.cluster.local:5432/testdb
  PAYMENT_DB_USER: testuser
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KEYCLOAK_ISSUER_URI: https://keycloak-platform.apps-crc.testing/realms/master
  PAYMENT_EVENTS_ENABLED: "true"
  PAYMENT_EVENTS_TOPIC: payment.events
  SERVER_PORT: "8443"
  SERVER_SSL_ENABLED: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secret
stringData:
  PAYMENT_DB_PASSWORD: testpass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          envFrom:
            - configMapRef:
                name: payment-service-config
            - secretRef:
                name: payment-service-secret
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djavax.net.ssl.trustStore=/etc/ssl/openshift/truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8443
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8443
              scheme: HTTPS
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: truststore
              mountPath: /etc/ssl/openshift
              readOnly: true
            - name: service-tls
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: truststore
          secret:
            secretName: platform-truststore
        - name: service-tls
          secret:
            secretName: payment-service-tls
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: payment-service-tls
spec:
  selector:
    app: payment-service
  ports:
    - port: 8443
      targetPort: 8443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: payment-service
spec:
  host: payment-service-platform.apps-crc.testing
  to:
    kind: Service
    name: payment-service
  port:
    targetPort: 8443
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
