server:
  port: ${SERVER_PORT:8087}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    certificate: ${SERVER_SSL_CERT:/etc/tls/tls.crt}
    certificate-private-key: ${SERVER_SSL_KEY:/etc/tls/tls.key}

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka.${PLATFORM_NAMESPACE:platform}.svc.cluster.local:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-512}
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:/etc/kafka/truststore.jks}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:changeit}
      ssl.truststore.type: ${KAFKA_SSL_TRUSTSTORE_TYPE:JKS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${PAYMENT_CONSUMER_GROUP:payment-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak-platform.${APP_BASE_DOMAIN:apps.example.invalid}/realms/master}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak.${PLATFORM_NAMESPACE:platform}.svc.cluster.local/realms/master/protocol/openid-connect/certs}

payment:
  config:
    master-key: ${PAYMENT_CONFIG_MASTER_KEY:}
  events:
    enabled: ${PAYMENT_EVENTS_ENABLED:true}
    topic: ${PAYMENT_EVENTS_TOPIC:payment.events}
  order-events:
    topic: ${PAYMENT_ORDER_EVENTS_TOPIC:order.events}

management:
  endpoints:
    web:
      exposure:
        include: health,info

providers:
  paypal:
    enabled: ${PAYMENT_PAYPAL_ENABLED:false}
    environment: ${PAYMENT_PAYPAL_ENVIRONMENT:production}
    client-id: ${PAYMENT_PAYPAL_CLIENT_ID:}
    client-secret: ${PAYMENT_PAYPAL_CLIENT_SECRET:}
    base-url: ${PAYMENT_PAYPAL_BASE_URL:https://api-m.paypal.com}
    brand-name: ${PAYMENT_PAYPAL_BRAND_NAME:TSA Store}
    webhook-id: ${PAYMENT_PAYPAL_WEBHOOK_ID:}
  fabrick:
    enabled: ${PAYMENT_FABRICK_ENABLED:false}
    environment: ${PAYMENT_FABRICK_ENVIRONMENT:production}
    api-key: ${PAYMENT_FABRICK_API_KEY:}
    shop-login: ${PAYMENT_FABRICK_SHOP_LOGIN:}
    base-url: ${PAYMENT_FABRICK_BASE_URL:}
    lightbox-script-url: ${PAYMENT_FABRICK_LIGHTBOX_SCRIPT_URL:}
    notification-url: ${PAYMENT_FABRICK_NOTIFICATION_URL:}
